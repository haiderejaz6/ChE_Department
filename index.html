<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChE Office Allocation — NUST</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#1b3d28; color:white; padding:15px; }
.main { padding:20px; }

.map-title { font-size:18px; font-weight:bold; margin:15px 0 10px; }

.floor { margin-bottom:25px; padding:15px; background:white; border-radius:8px; }

.room {
  border:1px solid #ddd;
  border-radius:6px;
  margin-bottom:10px;
}

.room-head {
  background:#eee;
  padding:6px 10px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.room-body {
  padding:8px;
}

.cubs {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
}

.cub {
  border:1px dashed #bbb;
  padding:8px;
  text-align:center;
  border-radius:6px;
  background:#fafafa;
}

.empty { color:#888; font-style:italic; }

</style>
</head>

<body>

<header>
  <h2>Department of Chemical Engineering — Office Allocation</h2>
</header>

<div class="main" id="app"></div>

<script>

// ---------- DATA ----------
const FACULTY = {
  f01:'Dr. Iftikhar Ahmad',
  f03:'Dr. Tayyaba Noor',
  f05:'Dr. Muhammad Ahsan',
  f06:'Dr. Muhammad Salman Haider',
  f11:'Dr. Nouman Ahmad'
};

const OFFICES = {
  // First Floor
  c5: { label:'Cubicle 1', occupants:['f03'] },
  c3: { label:'Cubicle 2', occupants:['f05'] },

  // Second Floor
  hod:{ label:'HoD Office', occupants:['f01'] },
  bi1:{ label:'Bi-Seater A', occupants:['f11'] },
  bi2:{ label:'Bi-Seater B', occupants:['f06'] },

  c1:{ label:'Cubicle 1', occupants:['f11'] },
  c2:{ label:'Cubicle 2', occupants:['f06'] },
  c6:{ label:'Cubicle 3', occupants:[] },

  // Third Floor
  tri1:{ label:'Tri-Seater A', occupants:[] },
  tri2:{ label:'Tri-Seater B', occupants:[] },
  tri3:{ label:'Tri-Seater C', occupants:[] },
  fbi:{ label:'Female Bi-Seater', occupants:[] },

  c4:{ label:'Cubicle 1', occupants:[] },
  c7:{ label:'Cubicle 2', occupants:[] }
};

// ---------- HELPERS ----------
function person(id){
  return FACULTY[id] || '';
}

function roomHTML(id){
  const o = OFFICES[id];
  const occ = o.occupants;

  return `
    <div class="room">
      <div class="room-head">
        ${o.label}
        <span>${occ.length}</span>
      </div>
      <div class="room-body">
        ${occ.length ? occ.map(p=>`<div>${person(p)}</div>`).join('')
                     : '<div class="empty">Empty</div>'}
      </div>
    </div>
  `;
}

function cubHTML(id){
  const o = OFFICES[id];
  const occ = o.occupants[0];

  return `
    <div class="cub">
      <div><b>${o.label}</b></div>
      <div>${occ ? person(occ) : '<span class="empty">Empty</span>'}</div>
    </div>
  `;
}

// ---------- RENDER ----------
document.getElementById('app').innerHTML = `

<div class="floor">
  <div class="map-title">First Floor</div>
  <div class="cubs">
    ${cubHTML('c5')}
    ${cubHTML('c3')}
  </div>
</div>

<div class="floor">
  <div class="map-title">Second Floor</div>

  ${roomHTML('hod')}
  ${roomHTML('bi1')}
  ${roomHTML('bi2')}

  <div class="map-title">Cubicles</div>
  <div class="cubs">
    ${cubHTML('c1')}
    ${cubHTML('c2')}
    ${cubHTML('c6')}
  </div>
</div>

<div class="floor">
  <div class="map-title">Third Floor</div>

  ${roomHTML('tri1')}
  ${roomHTML('tri2')}
  ${roomHTML('tri3')}
  ${roomHTML('fbi')}

  <div class="map-title">Cubicles</div>
  <div class="cubs">
    ${cubHTML('c4')}
    ${cubHTML('c7')}
  </div>
</div>

`;

</script>

</body>
</html>
